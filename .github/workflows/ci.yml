name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          NODE_ENV: production
      - name: Serve dist/ for pa11y-ci
        run: npx serve -l 4321 dist &
      - name: Wait for local server
        run: npx wait-on http://localhost:4321
      - run: npx pa11y-ci
